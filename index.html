<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICKSTER VAULT | Admin Skin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #e67e22; }
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .sidebar { height: 100vh; background: var(--primary-color); color: white; position: fixed; width: 260px; transition: all 0.3s; z-index: 1000; }
        .main-content { margin-left: 260px; padding: 40px; }
        .card-upload { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: white; }
        .form-label { font-weight: 600; color: #444; }
        .btn-mickster { background: var(--accent-color); color: white; border-radius: 12px; padding: 12px 30px; font-weight: 600; border: none; width: 100%; transition: 0.3s; }
        .btn-mickster:hover { background: #d35400; transform: translateY(-2px); color: white; }
        
        #image-preview { width: 100%; height: 250px; border: 3px dashed #cbd5e0; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-top: 15px; position: relative; background: #fdfdfd; overflow: hidden; }
        #image-preview img { width: 100%; height: 100%; object-fit: contain; }
        
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main-content { margin-left: 0; padding: 20px; } }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column p-4 shadow">
        <h2 class="text-center fw-bold mb-4" style="color: var(--accent-color);">MICKSTER</h2>
        <p class="text-center small text-uppercase mb-5" style="letter-spacing: 2px;">Vault Developer</p>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item mb-3"><a href="#" class="nav-link text-white active bg-dark">Dashboard</a></li>
            <li class="nav-item mb-3"><a href="#" class="nav-link text-white">My Skins</a></li>
            <li class="nav-item mb-3"><a href="#" class="nav-link text-white">User Statistics</a></li>
        </ul>
        <div class="mt-auto">
            <div class="p-3 bg-dark rounded-3 text-center">
                <small class="d-block opacity-50">App Status</small>
                <span class="text-success" id="db-status">● Connecting...</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <header class="mb-5">
                <h1 class="fw-bold">Upload Bus Skins</h1>
                <p class="text-muted">Tumia link ya Catbox kuweka skin mpya kwenye database.</p>
            </header>

            <div class="row">
                <div class="col-xl-8">
                    <div class="card-upload p-5">
                        <form id="uploadForm">
                            <div class="mb-4">
                                <label class="form-label">Jina la Basi/Skin</label>
                                <input type="text" id="skin_title" class="form-control form-control-lg" placeholder="Mfano: Abood Military Edition" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Aina ya Basi (Category)</label>
                                <select id="bus_type" class="form-select form-select-lg">
                                    <option value="Yutong F12">Yutong F12</option>
                                    <option value="Zhongtong Mega">Zhongtong Mega</option>
                                    <option value="Higer">Higer</option>
                                    <option value="Yutong D14">Yutong D14</option>
                                    <option value="Marcopolo G7">Marcopolo G7</option>
                                    <option value="Kibamia">Kibamia</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Weka Link ya Skin (Catbox URL)</label>
                                <input type="url" id="catbox_url" class="form-control" placeholder="https://files.catbox.moe/xxxxxx.png" required>
                                <div id="image-preview">
                                    <div class="text-center text-muted" id="preview-placeholder">
                                        <p class="mb-0">Picha itatokea hapa...</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Maelezo/Credits (Optional)</label>
                                <textarea id="credits" class="form-control" rows="3" placeholder="Mfano: Skin imetengenezwa na Mickster..."></textarea>
                            </div>

                            <button type="button" id="submitBtn" class="btn btn-mickster shadow-sm">PUBLISH SKIN NOW</button>
                        </form>
                    </div>
                </div>

                <div class="col-xl-4 mt-4 mt-xl-0">
                    <div class="card p-4 border-0 shadow-sm rounded-4 mb-4">
                        <h5 class="fw-bold">Tips kwa Admin</h5>
                        <ul class="small text-muted ps-3 mt-3">
                            <li class="mb-2">Tumia Direct Link ya Catbox.</li>
                            <li class="mb-2">Data inaonekana Website papo hapo.</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Config yako na API Key uliyotoa
        const firebaseConfig = {
            apiKey: "AIzaSyDiNjWTVcqZYsiHDWyxvU35qoAakwhFZKk",
            authDomain: "mickster-vault.firebaseapp.com",
            projectId: "mickster-vault",
            storageBucket: "mickster-vault.appspot.com",
            messagingSenderId: "109876543210",
            appId: "1:109876543210:web:abcdef123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Update Status
        document.getElementById('db-status').innerText = "● Connected";

        // Preview Logic
        document.getElementById('catbox_url').addEventListener('input', function() {
            const url = this.value;
            const previewContainer = document.getElementById('image-preview');
            if (url && url.includes('files.catbox.moe')) {
                previewContainer.innerHTML = `<img src="${url}" alt="Catbox Preview">`;
            }
        });

        // Publish Function
        window.publishSkin = async function() {
            const btn = document.getElementById('submitBtn');
            const title = document.getElementById('skin_title').value;
            const link = document.getElementById('catbox_url').value;
            const category = document.getElementById('bus_type').value;
            const credits = document.getElementById('credits').value;

            if(!title || !link) {
                alert("Tafadhali jaza jina na link ya Catbox!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "UPLOADING...";

            try {
                await addDoc(collection(db, "skins"), {
                    title: title,
                    category: category,
                    imageUrl: link,
                    downloadUrl: link,
                    credits: credits,
                    createdAt: serverTimestamp()
                });

                alert("Skin '" + title + "' imechapishwa kikamilifu!");
                document.getElementById('uploadForm').reset();
                document.getElementById('image-preview').innerHTML = '<p class="text-muted">Picha itatokea hapa...</p>';
            } catch (error) {
                console.error("Error: ", error);
                alert("Imefeli kutuma: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "PUBLISH SKIN NOW";
            }
        };

        document.getElementById('submitBtn').onclick = window.publishSkin;
    </script>
</body>
</html>
