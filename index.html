<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MICKSTER VAULT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --sidebar-bg: #2c3e50; --accent: #e67e22; --dark-bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); margin: 0; }
        
        .wrapper { display: flex; align-items: stretch; min-height: 100vh; }
        
        /* Sidebar imepunguzwa upana (Small Left) */
        #sidebar { min-width: 200px; max-width: 200px; background: var(--sidebar-bg); color: #fff; transition: all 0.3s; }
        
        /* Content imepanuliwa (Big Right) */
        #content { flex: 1; padding: 40px; background-color: var(--dark-bg); }

        .sidebar-header { padding: 20px; background: #1a252f; text-align: center; }
        .sidebar-header h3 { color: var(--accent); font-weight: 700; font-size: 1.1rem; margin: 0; }
        #sidebar ul li a { padding: 15px 20px; display: block; color: #adb5bd; text-decoration: none; border-left: 3px solid transparent; font-size: 0.9rem; }
        #sidebar ul li a:hover, #sidebar ul li a.active { background: #34495e; color: #fff; border-left: 3px solid var(--accent); }

        .admin-card { background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; padding: 30px; margin-bottom: 30px; }
        .form-label { font-weight: 600; color: #444; }
        .preview-box { border: 2px dashed #ddd; border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 20px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .preview-img { max-height: 200px; border-radius: 5px; display: none; }
        
        .btn-publish { background: var(--accent); color: white; font-weight: 600; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 1.1rem; }
        .btn-publish:hover { background: #d35400; color: white; }

        .skin-item-card { border-radius: 10px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; background: white; }
        .skin-item-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .skin-item-img { height: 140px; width: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav id="sidebar">
        <div class="sidebar-header">
            <h3>MICKSTER</h3>
            <small>VAULT DEVELOPER</small>
        </div>
        <ul class="list-unstyled components">
            <li><a href="#" class="active" onclick="showSection('upload')"><i class="fas fa-upload me-2"></i> Dashboard</a></li>
            <li><a href="#" onclick="showSection('manage')"><i class="fas fa-images me-2"></i> My Skins</a></li>
            <li><a href="index.html"><i class="fas fa-globe me-2"></i> View Site</a></li>
        </ul>
    </nav>

    <div id="content">
        <div id="upload-section">
            <h2 class="fw-bold mb-1">Upload Bus Skins</h2>
            <p class="text-muted mb-4">Tumia link ya Catbox kuweka skin mpya kwenye database.</p>

            <div class="row">
                <div class="col-12"> <div class="admin-card">
                        <form id="uploadForm">
                            <div class="mb-3">
                                <label class="form-label">Jina la Basi/Skin</label>
                                <input type="text" id="title" class="form-control form-control-lg" placeholder="GOD FIRST LUXURY" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Aina ya Basi (Category)</label>
                                <select id="category" class="form-select form-select-lg" required>
                                    <option value="Yutong F12">Yutong F12</option>
                                    <option value="Zhongtong Mega">Zhongtong Mega</option>
                                    <option value="Higer">Higer</option>
                                    <option value="Yutong D14">Yutong D14</option>
                                    <option value="Marcopolo G7">Marcopolo G7</option>
                                    <option value="Kibamia">Kibamia</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Weka Link ya Skin (Catbox URL)</label>
                                <input type="url" id="imageUrl" class="form-control form-control-lg" placeholder="https://files.catbox.moe/xxxx.png" oninput="previewImg(this.value)" required>
                            </div>
                            
                            <div class="preview-box">
                                <img id="imgPreview" class="preview-img" src="" alt="Preview">
                                <p id="previewText" class="text-muted m-0">Preview itaonekana hapa ukishaweka link</p>
                            </div>

                            <button type="submit" id="btnSubmit" class="btn btn-publish">PUBLISH SKIN NOW</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="manage-section" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">My Skins Management</h2>
                <select class="form-select w-25" onchange="filterAdminSkins(this.value)">
                    <option value="all">Kategoria Zote</option>
                    <option value="Yutong F12">Yutong F12</option>
                    <option value="Zhongtong Mega">Zhongtong Mega</option>
                    <option value="Yutong D14">Yutong D14</option>
                </select>
            </div>
            <div class="row" id="adminSkinsList"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Edit Skin Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">Jina la Skin</label>
                    <input type="text" id="editTitle" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Kategoria</label>
                    <select id="editCategory" class="form-select">
                        <option value="Yutong F12">Yutong F12</option>
                        <option value="Zhongtong Mega">Zhongtong Mega</option>
                        <option value="Higer">Higer</option>
                        <option value="Yutong D14">Yutong D14</option>
                        <option value="Marcopolo G7">Marcopolo G7</option>
                        <option value="Kibamia">Kibamia</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Funga</button>
                <button type="button" class="btn btn-primary" onclick="updateSkinData()">Hifadhi</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiNjWTVcqZYsiHDWyxvU35qoAakwhFZKk",
        authDomain: "mickster-vault.firebaseapp.com",
        projectId: "mickster-vault",
        storageBucket: "mickster-vault.appspot.com",
        messagingSenderId: "109876543210",
        appId: "1:109876543210:web:abcdef123456"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allSkins = [];

    window.showSection = (id) => {
        document.getElementById('upload-section').style.display = id === 'upload' ? 'block' : 'none';
        document.getElementById('manage-section').style.display = id === 'manage' ? 'block' : 'none';
        document.querySelectorAll('#sidebar ul li a').forEach(a => a.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };

    window.previewImg = (url) => {
        const img = document.getElementById('imgPreview');
        const txt = document.getElementById('previewText');
        if(url.startsWith('http')) {
            img.src = url;
            img.style.display = 'inline-block';
            txt.style.display = 'none';
        }
    };

    const uploadForm = document.getElementById('uploadForm');
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            await addDoc(collection(db, "skins"), {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                imageUrl: document.getElementById('imageUrl').value,
                createdAt: serverTimestamp()
            });
            alert("Skin imepakiwa kikamilifu!");
            uploadForm.reset();
            document.getElementById('imgPreview').style.display = 'none';
            document.getElementById('previewText').style.display = 'block';
        } catch (err) { alert("Error: " + err.message); }
        btn.disabled = false;
        btn.innerText = "PUBLISH SKIN NOW";
    });

    const q = query(collection(db, "skins"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        allSkins = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderAdminList(allSkins);
    });

    function renderAdminList(data) {
        const list = document.getElementById('adminSkinsList');
        list.innerHTML = '';
        data.forEach(skin => {
            list.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="skin-item-card">
                        <img src="${skin.imageUrl}" class="skin-item-img">
                        <div class="p-3">
                            <h6 class="mb-1 fw-bold text-truncate">${skin.title}</h6>
                            <small class="text-warning d-block mb-3">${skin.category}</small>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary w-100" onclick="openEdit('${skin.id}', '${skin.title}', '${skin.category}')">Edit</button>
                                <button class="btn btn-sm btn-outline-danger w-100" onclick="deleteSkin('${skin.id}')">Futa</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    window.deleteSkin = async (id) => { if(confirm("Futa skin hii?")) await deleteDoc(doc(db, "skins", id)); };

    window.openEdit = (id, title, cat) => {
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = title;
        document.getElementById('editCategory').value = cat;
        new bootstrap.Modal(document.getElementById('editModal')).show();
    };

    window.updateSkinData = async () => {
        const id = document.getElementById('editId').value;
        await updateDoc(doc(db, "skins", id), {
            title: document.getElementById('editTitle').value,
            category: document.getElementById('editCategory').value
        });
        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
    };

    window.filterAdminSkins = (cat) => {
        renderAdminList(cat === 'all' ? allSkins : allSkins.filter(s => s.category === cat));
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
